<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOMEolka — stříbrný Airstream drink point</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9SHFK2QYSL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-9SHFK2QYSL');
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400&display=swap');

    :root{
      --bg: #FDFBF7;
      --wine: #4A0E1C;
      --magenta: #D83B7D;
    }

    html { scroll-behavior: smooth; }
    body{
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 10% 0%, #fff 0%, #FDFBF7 45%, #FBF7F2 100%);
      color: var(--wine);
    }
    h1,h2,h3 { font-family: 'Dancing Script', cursive; }

    .glass{
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(74,14,28,0.08);
    }

    .soft-shadow{ box-shadow: 0 8px 30px rgba(74,14,28,0.08); }
  </style>
</head>
<body class="antialiased">
  <header class="sticky top-0 z-50 border-b border-[#4A0E1C]/10 bg-[#FDFBF7]/85 backdrop-blur-md">
    <nav class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between gap-4">
      <a href="#top" class="text-2xl md:text-3xl leading-none">
        <span style="color:#4A0E1C;">HOME</span><span style="color:#D83B7D;">olka</span>
      </a>

      <ul class="hidden md:flex items-center gap-6 text-sm">
        <li><a href="#about" class="hover:text-[#D83B7D] transition">O nás</a></li>
        <li><a href="#offer" class="hover:text-[#D83B7D] transition">Nabídka</a></li>
        <li><a href="#instagram" class="hover:text-[#D83B7D] transition">Instagram</a></li>
        <li><a href="#kontakt" class="hover:text-[#D83B7D] transition">Kontakt</a></li>
      </ul>

      <a href="#kontakt" class="text-xs md:text-sm px-4 py-2 rounded-full text-white" style="background:#D83B7D;">Kde nás najdete?</a>
    </nav>
  </header>

  <section id="top" class="max-w-6xl mx-auto px-5 pt-8 md:pt-12 pb-16 md:pb-20">
    <div class="rounded-2xl overflow-hidden bg-gray-200 h-52 md:h-72 lg:h-80 flex items-center justify-center soft-shadow">
      <span class="text-gray-500 text-sm">[ Placeholder: Silver Airstream trailer image ]</span>
    </div>

    <div class="text-center mt-8 md:mt-10 space-y-4">
      <h1 id="heroTitle" class="text-6xl md:text-8xl leading-none text-[#4A0E1C]">homeolka</h1>
      <p id="heroSub" class="text-base md:text-lg font-light max-w-2xl mx-auto"></p>
      <a id="heroCTA" href="#kontakt" class="inline-block mt-2 px-7 py-3 rounded-full text-white text-sm md:text-base soft-shadow" style="background:#D83B7D;"></a>
    </div>
  </section>

  <section id="about" class="max-w-4xl mx-auto px-5 py-14 md:py-20">
    <h2 id="aboutTitle" class="text-4xl md:text-5xl text-center mb-6"></h2>
    <p id="aboutText" class="text-center font-light leading-relaxed md:text-lg"></p>
  </section>

  <section id="offer" class="max-w-6xl mx-auto px-5 py-14 md:py-20">
    <h2 id="offerTitle" class="text-4xl md:text-5xl text-center mb-10 md:mb-12"></h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
      <article class="glass rounded-2xl p-7 text-center soft-shadow">
        <div class="mx-auto w-12 h-12 mb-4 text-[#D83B7D]">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-full h-full">
            <path d="M4 10h12v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-5Z"/>
            <path d="M16 11h2a2.5 2.5 0 1 1 0 5h-2"/>
            <path d="M7 4c0 1 1 1.5 1 2.5S7 8 7 9"/>
            <path d="M11 4c0 1 1 1.5 1 2.5S11 8 11 9"/>
          </svg>
        </div>
        <h3 id="offer1Title" class="text-3xl mb-2"></h3>
        <p id="offer1Text" class="font-light text-sm leading-relaxed text-[#4A0E1C]/85"></p>
      </article>

      <article class="glass rounded-2xl p-7 text-center soft-shadow">
        <div class="mx-auto w-12 h-12 mb-4 text-[#D83B7D]">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-full h-full">
            <path d="M3 13c1-3 4-5 9-5s8 2 9 5"/>
            <path d="M3 16h18"/>
            <path d="M5 10c2-2 4-3 7-3s5 1 7 3"/>
          </svg>
        </div>
        <h3 id="offer2Title" class="text-3xl mb-2"></h3>
        <p id="offer2Text" class="font-light text-sm leading-relaxed text-[#4A0E1C]/85"></p>
      </article>

      <article class="glass rounded-2xl p-7 text-center soft-shadow">
        <div class="mx-auto w-12 h-12 mb-4 text-[#D83B7D]">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-full h-full">
            <path d="M4 5h16l-8 8-8-8Z"/>
            <path d="M12 13v6"/>
            <path d="M9 19h6"/>
            <path d="M16.5 3.5 18 2"/>
          </svg>
        </div>
        <h3 id="offer3Title" class="text-3xl mb-2"></h3>
        <p id="offer3Text" class="font-light text-sm leading-relaxed text-[#4A0E1C]/85"></p>
      </article>
    </div>
  </section>

  <section id="instagram" class="max-w-6xl mx-auto px-5 py-14 md:py-20">
    <h2 id="instaTitle" class="text-4xl md:text-5xl text-center mb-8 md:mb-10"></h2>
    <div id="instagramGrid" class="grid grid-cols-3 gap-3 md:gap-4"></div>
    <p class="text-center text-xs md:text-sm mt-4 text-[#4A0E1C]/70">Statická galerie z reálného Instagram obsahu, průběžně doplňovaná ručně.</p>
  </section>

  <footer id="kontakt" class="mt-6 pt-10 pb-12 border-t border-[#4A0E1C]/10">
    <div class="max-w-6xl mx-auto px-5 space-y-8">
      <div class="w-full rounded-2xl overflow-hidden soft-shadow border border-[#4A0E1C]/10">
        <iframe
          title="Mapa: homeolka"
          src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d620.5692139335355!2d14.052242431463364!3d49.961528049553834!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1scs!2scz!4v1774994601966!5m2!1scs!2scz"
          class="w-full h-56 md:h-80"
          style="border:0;"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <div class="text-center space-y-3">
        <p class="text-lg"><a id="emailLink" href="mailto:info@homeolka.cz" class="hover:text-[#D83B7D] transition">info@homeolka.cz</a></p>
        <p id="footerNote" class="text-sm font-light opacity-80"></p>
        <div class="flex justify-center items-center gap-5 text-sm pt-2">
          <a href="#" class="hover:text-[#D83B7D] transition">Instagram</a>
          <span class="opacity-30">•</span>
          <a href="#" class="hover:text-[#D83B7D] transition">Facebook</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    async function loadContent() {
      try {
        const response = await fetch('./site-content.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const content = await response.json();
        Object.keys(content).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.textContent = content[id];
        });
      } catch (error) {
        console.error('Nepodařilo se načíst obsah ze site-content.json:', error);
      }
    }

    async function loadInstagramFeed() {
      const grid = document.getElementById('instagramGrid');
      if (!grid) return;

      try {
        const response = await fetch('./assets/instagram/instagram-feed.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const items = await response.json();
        const visibleItems = items.slice(0, 6);

        grid.innerHTML = visibleItems.map((item) => `
          <a href="${item.link || '#'}" target="_blank" rel="noreferrer" class="group block rounded-xl overflow-hidden soft-shadow bg-gray-200">
            <div class="aspect-square relative">
              <img src="${item.src}" alt="${item.alt || 'Instagram fotka'}" loading="lazy" class="w-full h-full object-cover transition duration-300 group-hover:scale-[1.02]" onerror="this.closest('a').remove();" />
            </div>
          </a>
        `).join('');
      } catch (error) {
        console.error('Nepodařilo se načíst assets/instagram/instagram-feed.json:', error);
        grid.innerHTML = '';
      }
    }

    loadContent();
    loadInstagramFeed();
  </script>
</body>
</html>
