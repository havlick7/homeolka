<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>homeolka — silver airstream drink point</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400&display=swap');

    :root{
      --bg: #FDFBF7;
      --wine: #4A0E1C;
      --magenta: #D83B7D;
    }

    html { scroll-behavior: smooth; }
    body{
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 10% 0%, #fff 0%, #FDFBF7 45%, #FBF7F2 100%);
      color: var(--wine);
    }
    h1,h2,h3 { font-family: 'Dancing Script', cursive; }

    .glass{
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(74,14,28,0.08);
    }

    .soft-shadow{ box-shadow: 0 8px 30px rgba(74,14,28,0.08); }
  </style>
</head>
<body class="antialiased">
  <header class="sticky top-0 z-50 border-b border-[#4A0E1C]/10 bg-[#FDFBF7]/85 backdrop-blur-md">

        <li><a href="#kontakt" class="hover:text-[#D83B7D] transition">Kontakt</a></li>

      <a href="#kontakt" class="text-xs md:text-sm px-4 py-2 rounded-full text-white" style="background:#D83B7D;">Kde nás najdete?</a>

      <span class="text-gray-500 text-sm">[ Placeholder: Silver Airstream trailer image ]</span>

    <div class="text-center mt-8 md:mt-10 space-y-4">

      <a id="heroCTA" href="#kontakt" class="inline-block mt-2 px-7 py-3 rounded-full text-white text-sm md:text-base soft-shadow" style="background:#D83B7D;"></a>

  <section id="instagram" class="max-w-6xl mx-auto px-5 py-14 md:py-20">

    <div class="grid grid-cols-3 gap-3 md:gap-4">
      <div class="aspect-square bg-gray-200 rounded-xl flex items-center justify-center text-gray-500"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" class="w-7 h-7"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></div>
      <div class="aspect-square bg-gray-200 rounded-xl flex items-center justify-center text-gray-500"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" class="w-7 h-7"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></div>
      <div class="aspect-square bg-gray-200 rounded-xl flex items-center justify-center text-gray-500"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" class="w-7 h-7"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></div>

      <div class="aspect-square bg-gray-200 rounded-xl flex items-center justify-center text-gray-500"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" class="w-7 h-7"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></div>

  <footer id="kontakt" class="mt-6 pt-10 pb-12 border-t border-[#4A0E1C]/10">

      <div class="w-full rounded-2xl overflow-hidden bg-gray-300 h-56 md:h-80 flex items-center justify-center text-gray-600 soft-shadow">
        [ Placeholder: Google Maps ]
      </div>

      <div class="text-center space-y-3">
        <p class="text-lg"><a id="emailLink" href="mailto:info@homeolka.cz" class="hover:text-[#D83B7D] transition">info@homeolka.cz</a></p>
        <p id="footerNote" class="text-sm font-light opacity-80"></p>
        <div class="flex justify-center items-center gap-5 text-sm pt-2">
          <a href="#" class="hover:text-[#D83B7D] transition">Instagram</a>
          <span class="opacity-30">•</span>
          <a href="#" class="hover:text-[#D83B7D] transition">Facebook</a>
          <span class="opacity-30">•</span>
          <a href="#" class="hover:text-[#D83B7D] transition">TikTok</a>
        </div>

    </div>
  </footer>

  <script type="application/json" id="siteContent">
  {
    "heroTitle": "homeolka",
    "heroSub": "Stříbrný přívěs, výběrová káva a pohoda u parku.",
    "heroCTA": "Kde nás najdete?",
    "aboutTitle": "O nás",
    "aboutText": "Chtěli jsme vytvořit místo, kam si rádi zajdete po procházce, cvičení nebo jen tak s dětmi. Vzali jsme přívěs se stříbrným kabátem a naplnili ho tím nejlepším, co máme rádi – od výběrové kávy přes poctivý párek v rohlíku po vyladěné koktejly při západu slunce.",
    "offerTitle": "Co u nás najdete",
    "offer1Title": "Káva & Pohoda",
    "offer1Text": "Výběrová káva připravovaná s důrazem na chuť i detail. Ranní espresso, odpolední cappuccino a klidná atmosféra navíc.",
    "offer2Title": "Něco k snědku",
    "offer2Text": "Poctivý párek v rohlíku, drobné snacky a rychlé dobroty na cestu. Jednoduché, čerstvé a přesně to, na co máte chuť.",
    "offer3Title": "Drink Point",
    "offer3Text": "Lehké signature drinky, osvěžující limonády i večerní koktejly. Ideální tečka po dni u parku nebo při západu slunce.",
    "instaTitle": "Sledujte naši jízdu na @homeolka",
    "footerNote": "Když svítí sluníčko, jsme tu pro vás."
  }
  </script>

  <script>
    const content = JSON.parse(document.getElementById('siteContent').textContent);
    Object.keys(content).forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.textContent = content[id];
    });
  </script>
